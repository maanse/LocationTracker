  <title>Work Journey & Expense Tracker</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <style>
    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --text: #0f172a;
      --text-muted: #64748b;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --primary-soft: #dbeafe;
      --success: #059669;
      --success-soft: #d1fae5;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --warning: #d97706;
      --border: #e2e8f0;
      --shadow: 0 1px 3px rgba(15,23,42,0.08), 0 4px 12px rgba(15,23,42,0.06);
      --radius: 14px;
      --radius-sm: 10px;
      --nav-h: 68px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }

    button, input, textarea { font: inherit; touch-action: manipulation; }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
    }

    header {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      color: #fff;
      padding: 20px 20px 18px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    header h1 {
      margin: 0 0 4px;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header .date-display {
      font-size: 0.9rem;
      opacity: 0.85;
      font-weight: 500;
    }

    main { flex: 1; padding: 16px; }

    .panel { display: none; animation: fadeIn 0.2s ease; }
    .panel.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 16px;
      margin-bottom: 14px;
    }

    .card-title {
      margin: 0 0 12px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
    }

    /* ── Buttons ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 52px;
      padding: 14px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.12s ease, background 0.12s ease, opacity 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 4px 14px rgba(37,99,235,0.35);
    }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }

    .btn-success { background: var(--success); color: #fff; }

    .btn-outline {
      background: var(--surface);
      color: var(--text);
      border: 1.5px solid var(--border);
    }

    .btn-danger {
      background: var(--danger-soft);
      color: var(--danger);
      border: 1.5px solid #fecaca;
    }

    .btn-sm {
      min-height: 36px;
      padding: 8px 14px;
      font-size: 0.85rem;
      width: auto;
    }

    .btn-row { display: grid; gap: 10px; margin-top: 14px; }
    .btn-row.two-col { grid-template-columns: 1fr 1fr; }

    /* ── Stop list ── */
    .stop-list { list-style: none; margin: 0; padding: 0; }

    .stop-item {
      display: flex;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }
    .stop-item:last-child { border-bottom: none; padding-bottom: 0; }
    .stop-item:first-child { padding-top: 0; }

    .stop-num {
      flex-shrink: 0;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--primary-soft);
      color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
    }

    .stop-body { flex: 1; min-width: 0; }

    .stop-name {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .stop-meta {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .stop-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }

    .stop-tag {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: var(--primary);
      letter-spacing: 0.02em;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 28px 12px;
      color: var(--text-muted);
    }
    .empty-state svg { width: 48px; height: 48px; opacity: 0.35; margin-bottom: 10px; }
    .empty-state p { margin: 0; font-size: 0.92rem; }

    /* ── History ── */
    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .history-item:active,
    .history-item.selected { border-color: var(--primary); background: var(--primary-soft); }

    .history-date { font-weight: 700; font-size: 0.98rem; }
    .history-meta { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; }

    .history-badge {
      flex-shrink: 0;
      background: var(--primary);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
    }

    /* ── Map ── */
    #map-container {
      width: 100%;
      height: 280px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      margin-top: 14px;
    }
    #leafletMap { width: 100%; height: 100%; min-height: 280px; }

    .wjt-marker { background: none; border: none; }
    .wjt-marker-pin {
      width: 34px; height: 34px;
      background: var(--primary);
      color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 14px;
      border: 3px solid #fff;
      box-shadow: 0 2px 10px rgba(37,99,235,0.45);
    }

    .leaflet-popup-content-wrapper {
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
    }
    .leaflet-popup-content {
      margin: 10px 14px;
      font-family: var(--font);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .map-placeholder {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 0.88rem;
      line-height: 1.5;
    }
    .map-placeholder strong { color: var(--text); display: block; margin-bottom: 6px; }

    /* ── Form fields ── */
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .field input, .field textarea {
      width: 100%;
      min-height: 48px;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input:focus, .field textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    /* ── Project checkboxes in modal ── */
    .project-checks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .project-check-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .project-check-label:has(input:checked) {
      border-color: var(--primary);
      background: var(--primary-soft);
    }
    .project-check-label input[type="checkbox"] { display: none; }

    .cb-box {
      width: 20px; height: 20px;
      border-radius: 5px;
      border: 2px solid var(--border);
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.12s;
    }
    .project-check-label:has(input:checked) .cb-box {
      background: var(--primary);
      border-color: var(--primary);
    }
    .project-check-label:has(input:checked) .cb-box::after {
      content: '';
      width: 5px; height: 9px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translateY(-1px);
      display: block;
    }
    .cb-text {
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }

    /* ── Settings: project list ── */
    .project-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }
    .project-row:last-child { border-bottom: none; padding-bottom: 0; }
    .project-row:first-child { padding-top: 0; }
    .project-row-name { flex: 1; font-size: 0.95rem; font-weight: 500; }
    .project-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--primary);
      flex-shrink: 0;
    }

    .add-project-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .add-project-row input {
      flex: 1;
      min-height: 44px;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      outline: none;
      font: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .add-project-row input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }
    .add-project-row .btn { min-height: 44px; padding: 0 18px; width: auto; flex-shrink: 0; }

    .hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.45;
    }

    /* ── Nav ── */
    nav.bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
      z-index: 30;
      box-shadow: 0 -4px 20px rgba(15,23,42,0.06);
    }

    .nav-inner {
      max-width: 480px;
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn.active { color: var(--primary); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.45);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      padding: 16px;
      padding-bottom: calc(16px + var(--safe-bottom));
      backdrop-filter: blur(2px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 20px 50px rgba(15,23,42,0.25);
      animation: slideUp 0.22s ease;
      max-height: 90dvh;
      overflow-y: auto;
    }

    @keyframes slideUp {
      from { transform: translateY(24px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    .modal h2 { margin: 0 0 6px; font-size: 1.1rem; }
    .modal p  { margin: 0 0 16px; color: var(--text-muted); font-size: 0.88rem; }

    .modal-section-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin: 16px 0 8px;
    }
    .modal-section-label:first-of-type { margin-top: 0; }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(-120%);
      background: #0f172a;
      color: #fff;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 500;
      z-index: 200;
      max-width: calc(100% - 32px);
      text-align: center;
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: var(--shadow);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .loading-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: blink 1s infinite;
      margin-right: 6px;
    }
    @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

    @media (min-width: 481px) {
      .app { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
      #map-container { height: 360px; }
    }
  
    /* ── Modal meta row (date + coords) ── */
    .modal-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .meta-date-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 11px;
      border-radius: 999px;
      border: 1.5px solid var(--primary);
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .meta-date-btn:hover { background: #bfdbfe; }

    .meta-coords-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 11px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
      font-size: 0.78rem;
      font-family: ui-monospace, monospace;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.12s, color 0.12s;
      -webkit-tap-highlight-color: transparent;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meta-coords-btn:hover,
    .meta-coords-btn.active {
      border-color: var(--primary);
      color: var(--primary);
    }

    /* ── Location picker map inside modal ── */
    #locationPickerMap {
      width: 100%;
      height: 220px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      overflow: hidden;
    }

  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>Work Journey Tracker</h1>
    <div class="date-display" id="dateDisplay"></div>
  </header>
